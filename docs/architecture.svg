<svg width="100%" viewBox="0 0 680 630" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --arrow: #3d3d3a;
    --border-dash: rgba(60, 58, 50, 0.4);
    --ec2-label: #6e6e68;
    --airflow-label: #1a1a18;
    --airflow-sub: #6e6e68;
    --s3-label: #1a1a18;

    --proc-fill: #e8e6f8;
    --proc-stroke: #7c73d4;
    --proc-text: #3c3489;
    --proc-sub: #5e54b8;

    --store-fill: #d4f5e8;
    --store-stroke: #3bba8a;
    --store-text: #085041;
    --store-sub: #1a8a65;

    --serve-fill: #fde4d8;
    --serve-stroke: #e07850;
    --serve-text: #712b13;

    --ext-fill: #e8e8e6;
    --ext-stroke: #a0a098;
    --ext-text: #3d3d3a;
    --ext-sub: #6e6e68;

    --legend-text: #6e6e68;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --arrow: #c2c0b6;
      --border-dash: rgba(222, 220, 209, 0.3);
      --ec2-label: #c2c0b6;
      --airflow-label: #faf9f5;
      --airflow-sub: #c2c0b6;
      --s3-label: #faf9f5;

      --proc-fill: #3c3489;
      --proc-stroke: #afa9ec;
      --proc-text: #cecbf6;
      --proc-sub: #afa9ec;

      --store-fill: #085041;
      --store-stroke: #5dcaa5;
      --store-text: #9fe1cb;
      --store-sub: #5dcaa5;

      --serve-fill: #712b13;
      --serve-stroke: #f0997b;
      --serve-text: #f5c4b3;

      --ext-fill: #444441;
      --ext-stroke: #b4b2a9;
      --ext-text: #d3d1c7;
      --ext-sub: #b4b2a9;

      --legend-text: #c2c0b6;
    }
  }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="var(--arrow)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Gmail -->
<g onclick="sendPrompt('How does the Gmail API integration fetch DBS bank alerts?')" style="cursor:pointer">
  <rect x="230" y="16" width="200" height="44" rx="8" fill="var(--ext-fill)" stroke="var(--ext-stroke)" stroke-width="0.5"/>
  <text x="330" y="38" text-anchor="middle" dominant-baseline="central" fill="var(--ext-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">Gmail — DBS alerts</text>
</g>

<!-- Arrow Gmail → fetch_emails -->
<line x1="330" y1="60" x2="330" y2="98" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- EC2 container -->
<rect x="30" y="88" width="620" height="420" rx="16" fill="none" stroke="var(--border-dash)" stroke-width="1" stroke-dasharray="6 4"/>
<text x="50" y="110" fill="var(--ec2-label)" font-size="12" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">AWS EC2 instance</text>

<!-- Airflow label -->
<text x="50" y="134" fill="var(--airflow-label)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">Airflow DAG</text>
<text x="168" y="134" fill="var(--airflow-sub)" font-size="12" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">@hourly</text>

<!-- fetch_emails -->
<g onclick="sendPrompt('How does fetch_emails query Gmail for DBS transaction alerts?')" style="cursor:pointer">
  <rect x="245" y="148" width="160" height="44" rx="8" fill="var(--proc-fill)" stroke="var(--proc-stroke)" stroke-width="0.5"/>
  <text x="325" y="170" text-anchor="middle" dominant-baseline="central" fill="var(--proc-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">fetch_emails</text>
</g>

<!-- Branch: fetch_emails → load_to_lake (L-bend left) -->
<path d="M275 192 V206 H134 V218" fill="none" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>
<!-- Branch: fetch_emails → parse_emails (straight down) -->
<line x1="325" y1="192" x2="325" y2="218" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- load_to_lake -->
<g onclick="sendPrompt('How does load_to_lake save raw email JSON to S3?')" style="cursor:pointer">
  <rect x="56" y="220" width="155" height="50" rx="8" fill="var(--proc-fill)" stroke="var(--proc-stroke)" stroke-width="0.5"/>
  <text x="134" y="239" text-anchor="middle" dominant-baseline="central" fill="var(--proc-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">load_to_lake</text>
  <text x="134" y="255" text-anchor="middle" dominant-baseline="central" fill="var(--proc-sub)" font-size="12" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">raw JSON → S3</text>
</g>

<!-- parse_emails -->
<g onclick="sendPrompt('How does parse_emails extract transaction fields using regex?')" style="cursor:pointer">
  <rect x="245" y="220" width="155" height="50" rx="8" fill="var(--proc-fill)" stroke="var(--proc-stroke)" stroke-width="0.5"/>
  <text x="322" y="239" text-anchor="middle" dominant-baseline="central" fill="var(--proc-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">parse_emails</text>
  <text x="322" y="255" text-anchor="middle" dominant-baseline="central" fill="var(--proc-sub)" font-size="12" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">extract fields</text>
</g>

<!-- Arrow load_to_lake → S3 raw/ -->
<line x1="134" y1="270" x2="134" y2="296" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- S3 raw/ -->
<g onclick="sendPrompt('What does the S3 raw layer store?')" style="cursor:pointer">
  <rect x="56" y="298" width="155" height="44" rx="8" fill="var(--store-fill)" stroke="var(--store-stroke)" stroke-width="0.5"/>
  <text x="134" y="314" text-anchor="middle" dominant-baseline="central" fill="var(--store-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">raw/</text>
  <text x="134" y="330" text-anchor="middle" dominant-baseline="central" fill="var(--store-sub)" font-size="12" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">email JSON</text>
</g>

<!-- Arrow parse_emails → load_to_warehouse -->
<line x1="322" y1="270" x2="322" y2="296" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- load_to_warehouse -->
<g onclick="sendPrompt('How does load_to_warehouse deduplicate and write Parquet files?')" style="cursor:pointer">
  <rect x="240" y="298" width="175" height="50" rx="8" fill="var(--proc-fill)" stroke="var(--proc-stroke)" stroke-width="0.5"/>
  <text x="328" y="317" text-anchor="middle" dominant-baseline="central" fill="var(--proc-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">load_to_warehouse</text>
  <text x="328" y="333" text-anchor="middle" dominant-baseline="central" fill="var(--proc-sub)" font-size="12" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">dedupe → Parquet</text>
</g>

<!-- S3 bucket label -->
<text x="557" y="284" text-anchor="middle" fill="var(--s3-label)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">S3 bucket</text>

<!-- Arrow load_to_warehouse → S3 warehouse/ -->
<line x1="415" y1="323" x2="478" y2="323" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- S3 warehouse/ -->
<g onclick="sendPrompt('What does the S3 warehouse layer store?')" style="cursor:pointer">
  <rect x="480" y="298" width="155" height="50" rx="8" fill="var(--store-fill)" stroke="var(--store-stroke)" stroke-width="0.5"/>
  <text x="558" y="317" text-anchor="middle" dominant-baseline="central" fill="var(--store-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">warehouse/</text>
  <text x="558" y="333" text-anchor="middle" dominant-baseline="central" fill="var(--store-sub)" font-size="12" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">Parquet files</text>
</g>

<!-- Arrow load_to_warehouse → generate_dashboard -->
<line x1="328" y1="348" x2="328" y2="378" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- generate_dashboard -->
<g onclick="sendPrompt('How does generate_dashboard use DuckDB to aggregate metrics?')" style="cursor:pointer">
  <rect x="240" y="380" width="175" height="50" rx="8" fill="var(--proc-fill)" stroke="var(--proc-stroke)" stroke-width="0.5"/>
  <text x="328" y="399" text-anchor="middle" dominant-baseline="central" fill="var(--proc-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">generate_dashboard</text>
  <text x="328" y="415" text-anchor="middle" dominant-baseline="central" fill="var(--proc-sub)" font-size="12" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">DuckDB aggregation</text>
</g>

<!-- Arrow generate_dashboard → S3 dashboard/ -->
<line x1="415" y1="405" x2="478" y2="405" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- S3 dashboard/ -->
<g onclick="sendPrompt('What does the S3 dashboard layer contain?')" style="cursor:pointer">
  <rect x="480" y="380" width="155" height="50" rx="8" fill="var(--store-fill)" stroke="var(--store-stroke)" stroke-width="0.5"/>
  <text x="558" y="399" text-anchor="middle" dominant-baseline="central" fill="var(--store-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">dashboard/</text>
  <text x="558" y="415" text-anchor="middle" dominant-baseline="central" fill="var(--store-sub)" font-size="12" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">latest.json</text>
</g>

<!-- Bus line from S3 dashboard to services -->
<line x1="558" y1="430" x2="558" y2="450" stroke="var(--arrow)" stroke-width="0.5"/>
<line x1="180" y1="450" x2="558" y2="450" stroke="var(--arrow)" stroke-width="0.5"/>
<line x1="180" y1="450" x2="180" y2="466" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="510" y1="450" x2="510" y2="466" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Streamlit -->
<g onclick="sendPrompt('How does the Streamlit dashboard display expense data?')" style="cursor:pointer">
  <rect x="80" y="468" width="200" height="30" rx="8" fill="var(--serve-fill)" stroke="var(--serve-stroke)" stroke-width="0.5"/>
  <text x="180" y="483" text-anchor="middle" dominant-baseline="central" fill="var(--serve-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">Streamlit :8501</text>
</g>

<!-- FastAPI -->
<g onclick="sendPrompt('How does the FastAPI widget API serve data to the iPhone?')" style="cursor:pointer">
  <rect x="410" y="468" width="200" height="30" rx="8" fill="var(--serve-fill)" stroke="var(--serve-stroke)" stroke-width="0.5"/>
  <text x="510" y="483" text-anchor="middle" dominant-baseline="central" fill="var(--serve-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">Widget API :8051</text>
</g>

<!-- Arrows services → consumers -->
<line x1="180" y1="498" x2="180" y2="538" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="510" y1="498" x2="510" y2="538" stroke="var(--arrow)" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Browser -->
<g onclick="sendPrompt('What does the Streamlit expense dashboard show?')" style="cursor:pointer">
  <rect x="120" y="540" width="120" height="44" rx="8" fill="var(--ext-fill)" stroke="var(--ext-stroke)" stroke-width="0.5"/>
  <text x="180" y="562" text-anchor="middle" dominant-baseline="central" fill="var(--ext-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">Browser</text>
</g>

<!-- iPhone -->
<g onclick="sendPrompt('How does the iPhone Scriptable widget display expenses?')" style="cursor:pointer">
  <rect x="440" y="540" width="140" height="44" rx="8" fill="var(--ext-fill)" stroke="var(--ext-stroke)" stroke-width="0.5"/>
  <text x="510" y="555" text-anchor="middle" dominant-baseline="central" fill="var(--ext-text)" font-size="14" font-weight="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">iPhone</text>
  <text x="510" y="572" text-anchor="middle" dominant-baseline="central" fill="var(--ext-sub)" font-size="12" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">Scriptable widget</text>
</g>

<!-- Legend -->
<g transform="translate(56,605)" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">
  <rect width="10" height="10" rx="2" fill="var(--proc-fill)" stroke="var(--proc-stroke)"/>
  <text x="16" y="10" fill="var(--legend-text)" font-size="12">Processing</text>
  <rect x="110" width="10" height="10" rx="2" fill="var(--store-fill)" stroke="var(--store-stroke)"/>
  <text x="126" y="10" fill="var(--legend-text)" font-size="12">Storage</text>
  <rect x="206" width="10" height="10" rx="2" fill="var(--serve-fill)" stroke="var(--serve-stroke)"/>
  <text x="222" y="10" fill="var(--legend-text)" font-size="12">Serving</text>
  <rect x="290" width="10" height="10" rx="2" fill="var(--ext-fill)" stroke="var(--ext-stroke)"/>
  <text x="306" y="10" fill="var(--legend-text)" font-size="12">External</text>
</g>

</svg>
